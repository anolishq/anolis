name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  VCPKG_COMMIT: "66c0373dc7fca549e5803087b9487edfe3aca0a1"

jobs:
  release-linux-x86_64:
    name: Release (linux-x86_64)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++ jq

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Python and dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          doNotCache: false

      - name: Configure
        run: cmake --preset ci-linux-release-strict

      - name: Build
        run: cmake --build --preset ci-linux-release-strict --parallel

      - name: Test
        run: ctest --preset ci-linux-release-strict

      - name: Package binary artifact
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="anolis-${VERSION}-linux-x86_64.tar.gz"
          BINARY="build/ci-linux-release-strict/core/anolis-runtime"
          if [ ! -f "${BINARY}" ]; then
            echo "ERROR: binary not found at ${BINARY}" >&2
            exit 1
          fi
          mkdir -p staging/bin
          cp "${BINARY}" staging/bin/
          tar -czf "${ARTIFACT}" -C staging .
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Package source tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git archive --format=tar.gz \
            --prefix="anolis-${VERSION}/" \
            -o "anolis-${VERSION}-source.tar.gz" \
            HEAD

      - name: Generate checksums
        run: sha256sum anolis-*-linux-x86_64.tar.gz anolis-*-source.tar.gz > SHA256SUMS

      - name: Generate manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="${{ steps.package.outputs.artifact }}"
          SHA=$(grep "${ARTIFACT}" SHA256SUMS | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "anolishq/anolis" \
            --arg component "anolis" \
            --arg version "${VERSION}" \
            --arg platform "linux-x86_64" \
            --arg asset "${ARTIFACT}" \
            --arg sha256 "${SHA}" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, platform: $platform, asset: $asset, sha256: $sha256}' \
            > manifest.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            anolis-*-linux-x86_64.tar.gz
            anolis-*-source.tar.gz
            SHA256SUMS
            manifest.json
          generate_release_notes: true

  release-contracts:
    name: Release (contracts)
    runs-on: ubuntu-24.04
    needs: [release-linux-x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package telemetry schema artifact
        id: schema_package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_ARTIFACT="anolis-${VERSION}-telemetry-schema.tar.gz"
          SCHEMA_PATH="schemas/telemetry/telemetry-timeseries.schema.v1.json"
          BASELINE_PATH="docs/contracts/telemetry-timeseries-baseline.md"
          FIXTURE_MANIFEST_PATH="tests/contracts/telemetry-timeseries/examples/manifest.yaml"
          VALIDATOR_PATH="tests/contracts/telemetry-timeseries/validate-telemetry-timeseries.py"

          for path in "${SCHEMA_PATH}" "${BASELINE_PATH}" "${FIXTURE_MANIFEST_PATH}" "${VALIDATOR_PATH}"; do
            if [ ! -f "${path}" ]; then
              echo "ERROR: required schema artifact input missing: ${path}" >&2
              exit 1
            fi
          done

          mkdir -p schema-staging/schemas/telemetry
          mkdir -p schema-staging/docs/contracts
          mkdir -p schema-staging/tests/contracts/telemetry-timeseries/examples

          cp "${SCHEMA_PATH}" schema-staging/schemas/telemetry/
          cp "${BASELINE_PATH}" schema-staging/docs/contracts/
          cp "${FIXTURE_MANIFEST_PATH}" schema-staging/tests/contracts/telemetry-timeseries/examples/
          cp "${VALIDATOR_PATH}" schema-staging/tests/contracts/telemetry-timeseries/

          tar -czf "${SCHEMA_ARTIFACT}" -C schema-staging .
          echo "artifact=${SCHEMA_ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Generate schema manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_ARTIFACT="${{ steps.schema_package.outputs.artifact }}"
          SCHEMA_SHA=$(sha256sum "${SCHEMA_ARTIFACT}" | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "anolishq/anolis" \
            --arg component "telemetry-schema" \
            --arg version "${VERSION}" \
            --arg tag "v${VERSION}" \
            --arg asset "${SCHEMA_ARTIFACT}" \
            --arg sha256 "${SCHEMA_SHA}" \
            --arg source_schema_path "schemas/telemetry/telemetry-timeseries.schema.v1.json" \
            --arg source_baseline_path "docs/contracts/telemetry-timeseries-baseline.md" \
            --arg source_fixture_manifest_path "tests/contracts/telemetry-timeseries/examples/manifest.yaml" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, tag: $tag, asset: $asset, sha256: $sha256, source_schema_path: $source_schema_path, source_baseline_path: $source_baseline_path, source_fixture_manifest_path: $source_fixture_manifest_path}' \
            > telemetry-schema-manifest.json

      - name: Package runtime-config schema artifact
        id: rc_schema_package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_ARTIFACT="anolis-${VERSION}-runtime-config-schema.tar.gz"
          SCHEMA_PATH="schemas/runtime/runtime-config.schema.json"
          BASELINE_PATH="docs/contracts/runtime-config-baseline.md"
          FIXTURE_MANIFEST_PATH="tests/contracts/runtime-config/manifest.yaml"
          VALIDATOR_PATH="tests/contracts/runtime-config/validate-runtime-configs.py"

          for path in "${SCHEMA_PATH}" "${BASELINE_PATH}" "${FIXTURE_MANIFEST_PATH}" "${VALIDATOR_PATH}"; do
            if [ ! -f "${path}" ]; then
              echo "ERROR: required schema artifact input missing: ${path}" >&2
              exit 1
            fi
          done

          mkdir -p rc-staging/schemas/runtime
          mkdir -p rc-staging/docs/contracts
          mkdir -p rc-staging/tests/contracts/runtime-config/valid
          mkdir -p rc-staging/tests/contracts/runtime-config/invalid/schema
          mkdir -p rc-staging/tests/contracts/runtime-config/invalid/runtime

          cp "${SCHEMA_PATH}" rc-staging/schemas/runtime/
          cp "${BASELINE_PATH}" rc-staging/docs/contracts/
          cp "${FIXTURE_MANIFEST_PATH}" rc-staging/tests/contracts/runtime-config/
          cp "${VALIDATOR_PATH}" rc-staging/tests/contracts/runtime-config/
          cp tests/contracts/runtime-config/valid/*.yaml rc-staging/tests/contracts/runtime-config/valid/
          cp tests/contracts/runtime-config/invalid/schema/*.yaml rc-staging/tests/contracts/runtime-config/invalid/schema/
          cp tests/contracts/runtime-config/invalid/runtime/*.yaml rc-staging/tests/contracts/runtime-config/invalid/runtime/

          tar -czf "${SCHEMA_ARTIFACT}" -C rc-staging .
          echo "artifact=${SCHEMA_ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Generate runtime-config schema manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_ARTIFACT="${{ steps.rc_schema_package.outputs.artifact }}"
          SCHEMA_SHA=$(sha256sum "${SCHEMA_ARTIFACT}" | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "anolishq/anolis" \
            --arg component "runtime-config-schema" \
            --arg version "${VERSION}" \
            --arg tag "v${VERSION}" \
            --arg asset "${SCHEMA_ARTIFACT}" \
            --arg sha256 "${SCHEMA_SHA}" \
            --arg source_schema_path "schemas/runtime/runtime-config.schema.json" \
            --arg source_baseline_path "docs/contracts/runtime-config-baseline.md" \
            --arg source_fixture_manifest_path "tests/contracts/runtime-config/manifest.yaml" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, tag: $tag, asset: $asset, sha256: $sha256, source_schema_path: $source_schema_path, source_baseline_path: $source_baseline_path, source_fixture_manifest_path: $source_fixture_manifest_path}' \
            > runtime-config-schema-manifest.json

      - name: Package machine-profile schema artifact
        id: mp_schema_package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_ARTIFACT="anolis-${VERSION}-machine-profile-schema.tar.gz"
          SCHEMA_PATH="schemas/machine/machine-profile.schema.json"
          RUNTIME_SCHEMA_PATH="schemas/runtime/runtime-config.schema.json"
          BASELINE_PATH="docs/contracts/machine-profile-baseline.md"
          FIXTURE_MANIFEST_PATH="tests/contracts/machine-profile/manifest.yaml"
          VALIDATOR_PATH="tests/contracts/machine-profile/validate-machine-profiles.py"

          for path in "${SCHEMA_PATH}" "${RUNTIME_SCHEMA_PATH}" "${BASELINE_PATH}" "${FIXTURE_MANIFEST_PATH}" "${VALIDATOR_PATH}"; do
            if [ ! -f "${path}" ]; then
              echo "ERROR: required schema artifact input missing: ${path}" >&2
              exit 1
            fi
          done

          mkdir -p mp-staging/schemas/machine
          mkdir -p mp-staging/schemas/runtime
          mkdir -p mp-staging/docs/contracts
          mkdir -p mp-staging/tests/contracts/machine-profile/valid
          mkdir -p mp-staging/tests/contracts/machine-profile/invalid/schema
          mkdir -p mp-staging/tests/contracts/machine-profile/invalid/references

          cp "${SCHEMA_PATH}" mp-staging/schemas/machine/
          cp "${RUNTIME_SCHEMA_PATH}" mp-staging/schemas/runtime/
          cp "${BASELINE_PATH}" mp-staging/docs/contracts/
          cp "${FIXTURE_MANIFEST_PATH}" mp-staging/tests/contracts/machine-profile/
          cp "${VALIDATOR_PATH}" mp-staging/tests/contracts/machine-profile/
          cp tests/contracts/machine-profile/valid/*.yaml mp-staging/tests/contracts/machine-profile/valid/
          cp tests/contracts/machine-profile/invalid/schema/*.yaml mp-staging/tests/contracts/machine-profile/invalid/schema/
          cp tests/contracts/machine-profile/invalid/references/*.yaml mp-staging/tests/contracts/machine-profile/invalid/references/

          tar -czf "${SCHEMA_ARTIFACT}" -C mp-staging .
          echo "artifact=${SCHEMA_ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Generate machine-profile schema manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_ARTIFACT="${{ steps.mp_schema_package.outputs.artifact }}"
          SCHEMA_SHA=$(sha256sum "${SCHEMA_ARTIFACT}" | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "anolishq/anolis" \
            --arg component "machine-profile-schema" \
            --arg version "${VERSION}" \
            --arg tag "v${VERSION}" \
            --arg asset "${SCHEMA_ARTIFACT}" \
            --arg sha256 "${SCHEMA_SHA}" \
            --arg source_schema_path "schemas/machine/machine-profile.schema.json" \
            --arg source_baseline_path "docs/contracts/machine-profile-baseline.md" \
            --arg source_fixture_manifest_path "tests/contracts/machine-profile/manifest.yaml" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, tag: $tag, asset: $asset, sha256: $sha256, source_schema_path: $source_schema_path, source_baseline_path: $source_baseline_path, source_fixture_manifest_path: $source_fixture_manifest_path}' \
            > machine-profile-schema-manifest.json

      - name: Package runtime-http schema artifact
        id: rh_schema_package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_ARTIFACT="anolis-${VERSION}-runtime-http-schema.tar.gz"
          SCHEMA_PATH="schemas/http/runtime-http.openapi.v0.yaml"
          BASELINE_PATH="docs/contracts/runtime-http-baseline.md"
          FIXTURE_MANIFEST_PATH="tests/contracts/runtime-http/examples/manifest.yaml"
          VALIDATOR_OPENAPI_PATH="tests/contracts/runtime-http/validate-runtime-http-openapi.py"
          VALIDATOR_EXAMPLES_PATH="tests/contracts/runtime-http/validate-runtime-http-examples.py"
          VALIDATOR_CONFORMANCE_PATH="tests/contracts/runtime-http/validate-runtime-http-conformance.py"

          for path in "${SCHEMA_PATH}" "${BASELINE_PATH}" "${FIXTURE_MANIFEST_PATH}" \
              "${VALIDATOR_OPENAPI_PATH}" "${VALIDATOR_EXAMPLES_PATH}" "${VALIDATOR_CONFORMANCE_PATH}"; do
            if [ ! -f "${path}" ]; then
              echo "ERROR: required schema artifact input missing: ${path}" >&2
              exit 1
            fi
          done

          mkdir -p rh-staging/schemas/http
          mkdir -p rh-staging/docs/contracts
          mkdir -p rh-staging/tests/contracts/runtime-http/examples

          cp "${SCHEMA_PATH}" rh-staging/schemas/http/
          cp "${BASELINE_PATH}" rh-staging/docs/contracts/
          cp "${FIXTURE_MANIFEST_PATH}" rh-staging/tests/contracts/runtime-http/examples/
          cp tests/contracts/runtime-http/examples/*.json rh-staging/tests/contracts/runtime-http/examples/ 2>/dev/null || true
          cp tests/contracts/runtime-http/examples/*.txt rh-staging/tests/contracts/runtime-http/examples/ 2>/dev/null || true
          cp "${VALIDATOR_OPENAPI_PATH}" rh-staging/tests/contracts/runtime-http/
          cp "${VALIDATOR_EXAMPLES_PATH}" rh-staging/tests/contracts/runtime-http/
          cp "${VALIDATOR_CONFORMANCE_PATH}" rh-staging/tests/contracts/runtime-http/

          tar -czf "${SCHEMA_ARTIFACT}" -C rh-staging .
          echo "artifact=${SCHEMA_ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Generate runtime-http schema manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_ARTIFACT="${{ steps.rh_schema_package.outputs.artifact }}"
          SCHEMA_SHA=$(sha256sum "${SCHEMA_ARTIFACT}" | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "anolishq/anolis" \
            --arg component "runtime-http-schema" \
            --arg version "${VERSION}" \
            --arg tag "v${VERSION}" \
            --arg asset "${SCHEMA_ARTIFACT}" \
            --arg sha256 "${SCHEMA_SHA}" \
            --arg source_schema_path "schemas/http/runtime-http.openapi.v0.yaml" \
            --arg source_baseline_path "docs/contracts/runtime-http-baseline.md" \
            --arg source_fixture_manifest_path "tests/contracts/runtime-http/examples/manifest.yaml" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, tag: $tag, asset: $asset, sha256: $sha256, source_schema_path: $source_schema_path, source_baseline_path: $source_baseline_path, source_fixture_manifest_path: $source_fixture_manifest_path}' \
            > runtime-http-schema-manifest.json

      - name: Upload contract artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            anolis-*-telemetry-schema.tar.gz
            telemetry-schema-manifest.json
            anolis-*-runtime-config-schema.tar.gz
            runtime-config-schema-manifest.json
            anolis-*-machine-profile-schema.tar.gz
            machine-profile-schema-manifest.json
            anolis-*-runtime-http-schema.tar.gz
            runtime-http-schema-manifest.json
