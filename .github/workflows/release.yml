name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  VCPKG_COMMIT: "66c0373dc7fca549e5803087b9487edfe3aca0a1"

jobs:
  release-linux-x86_64:
    name: Release (linux-x86_64)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++ jq

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Python and dependencies
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          doNotCache: false

      - name: Configure
        run: cmake --preset ci-linux-release-strict

      - name: Build
        run: cmake --build --preset ci-linux-release-strict --parallel

      - name: Test
        run: ctest --preset ci-linux-release-strict

      - name: Package binary artifact
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="anolis-${VERSION}-linux-x86_64.tar.gz"
          BINARY="build/ci-linux-release-strict/core/anolis-runtime"
          if [ ! -f "${BINARY}" ]; then
            echo "ERROR: binary not found at ${BINARY}" >&2
            exit 1
          fi
          mkdir -p staging/bin
          cp "${BINARY}" staging/bin/
          tar -czf "${ARTIFACT}" -C staging .
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Package source tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git archive --format=tar.gz \
            --prefix="anolis-${VERSION}/" \
            -o "anolis-${VERSION}-source.tar.gz" \
            HEAD

      - name: Generate checksums
        run: sha256sum anolis-*-linux-x86_64.tar.gz anolis-*-source.tar.gz > SHA256SUMS

      - name: Generate manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="${{ steps.package.outputs.artifact }}"
          SHA=$(grep "${ARTIFACT}" SHA256SUMS | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "anolishq/anolis" \
            --arg component "anolis" \
            --arg version "${VERSION}" \
            --arg platform "linux-x86_64" \
            --arg asset "${ARTIFACT}" \
            --arg sha256 "${SHA}" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, platform: $platform, asset: $asset, sha256: $sha256}' \
            > manifest.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            anolis-*-linux-x86_64.tar.gz
            anolis-*-source.tar.gz
            SHA256SUMS
            manifest.json
          generate_release_notes: true

  release-contracts:
    name: Release (contracts)
    runs-on: ubuntu-24.04
    needs: [release-linux-x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package telemetry schema artifact
        id: schema_package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_ARTIFACT="anolis-${VERSION}-telemetry-schema.tar.gz"
          SCHEMA_PATH="schemas/telemetry/telemetry-timeseries.schema.v1.json"
          BASELINE_PATH="docs/contracts/telemetry-timeseries-baseline.md"
          FIXTURE_MANIFEST_PATH="tests/contracts/telemetry-timeseries/examples/manifest.yaml"
          VALIDATOR_PATH="tools/contracts/validate-telemetry-timeseries.py"

          for path in "${SCHEMA_PATH}" "${BASELINE_PATH}" "${FIXTURE_MANIFEST_PATH}" "${VALIDATOR_PATH}"; do
            if [ ! -f "${path}" ]; then
              echo "ERROR: required schema artifact input missing: ${path}" >&2
              exit 1
            fi
          done

          mkdir -p schema-staging/schemas/telemetry
          mkdir -p schema-staging/docs/contracts
          mkdir -p schema-staging/tests/contracts/telemetry-timeseries/examples
          mkdir -p schema-staging/tools/contracts

          cp "${SCHEMA_PATH}" schema-staging/schemas/telemetry/
          cp "${BASELINE_PATH}" schema-staging/docs/contracts/
          cp "${FIXTURE_MANIFEST_PATH}" schema-staging/tests/contracts/telemetry-timeseries/examples/
          cp "${VALIDATOR_PATH}" schema-staging/tools/contracts/

          tar -czf "${SCHEMA_ARTIFACT}" -C schema-staging .
          echo "artifact=${SCHEMA_ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Generate schema manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SCHEMA_ARTIFACT="${{ steps.schema_package.outputs.artifact }}"
          SCHEMA_SHA=$(sha256sum "${SCHEMA_ARTIFACT}" | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "anolishq/anolis" \
            --arg component "telemetry-schema" \
            --arg version "${VERSION}" \
            --arg tag "v${VERSION}" \
            --arg asset "${SCHEMA_ARTIFACT}" \
            --arg sha256 "${SCHEMA_SHA}" \
            --arg source_schema_path "schemas/telemetry/telemetry-timeseries.schema.v1.json" \
            --arg source_baseline_path "docs/contracts/telemetry-timeseries-baseline.md" \
            --arg source_fixture_manifest_path "tests/contracts/telemetry-timeseries/examples/manifest.yaml" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, tag: $tag, asset: $asset, sha256: $sha256, source_schema_path: $source_schema_path, source_baseline_path: $source_baseline_path, source_fixture_manifest_path: $source_fixture_manifest_path}' \
            > telemetry-schema-manifest.json

      - name: Upload contract artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            anolis-*-telemetry-schema.tar.gz
            telemetry-schema-manifest.json
