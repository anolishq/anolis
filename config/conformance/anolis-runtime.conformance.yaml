runtime:
  name: conformance-sim
  shutdown_timeout_ms: 2000
  startup_timeout_ms: 30000

http:
  enabled: true
  bind: 127.0.0.1
  port: 8080

providers:
  - id: sim0
    # Portable relative path (adjust based on your build configuration)
    # Windows Release: ../anolis-provider-sim/build/Release/anolis-provider-sim.exe
    # Windows Debug:   ../anolis-provider-sim/build/Debug/anolis-provider-sim.exe
    # Linux/macOS:     ../anolis-provider-sim/build/anolis-provider-sim
    command: ../anolis-provider-sim/build/Release/anolis-provider-sim.exe
    args: ["--config", "tests/integration/fixtures/provider-sim-default.yaml"]
    timeout_ms: 5000

polling:
  interval_ms: 500

telemetry:
  enabled: false

automation:
  enabled: false

logging:
  level: info
