providers:
  - id: test0
    command: ./provider-test

automation:
  enabled: true
  behavior_tree: ./behaviors/demo.xml
  tick_rate_hz: 5
  mode_transition_hooks:
    before_transition:
      - from: AUTO
        to: MANUAL
        calls:
          - device_handle: test0/device0
            function_name: set_output
            args:
              pwm: "120"
              enabled: "true"
              ratio: "12.5"
              label: "pump-a"

logging:
  level: info

