<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anolis System Composer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-header">
    <span class="app-title">Anolis System Composer</span>
    <span class="app-version">v1</span>
  </header>

  <div id="app-layout">
    <aside id="sidebar">
      <div id="sidebar-toolbar">
        <button id="btn-new-project">+ New…</button>
      </div>
      <ul id="project-list"></ul>
    </aside>

    <div id="main-content">
      <div id="project-header">
        <span id="project-name-display"></span>
        <span id="unsaved-indicator" title="Unsaved changes">●</span>
      </div>
      <div id="form-area">
        <p id="empty-state">Select a project or create a new one to get started.</p>
      </div>
      <div id="action-bar">
        <button id="btn-save">Save</button>
        <button id="btn-launch" disabled title="Launch is available in Phase 4">Launch →</button>
      </div>
    </div>
  </div>

  <div id="modal-overlay" aria-hidden="true">
    <div id="modal-container" role="dialog" aria-modal="true"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
